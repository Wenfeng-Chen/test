services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: interview
    ports:
      - "3307:3306"
    volumes:
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  master:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: master
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy

  worker1:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: worker
      WORKER_PORT: 8081
      MASTER_URL: http://master:8080
    depends_on:
      - master

  worker2:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: worker
      WORKER_PORT: 8082
      MASTER_URL: http://master:8080
    depends_on:
      - master
